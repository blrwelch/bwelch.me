<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>403 — Access Denied | Brittany Welch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a1628;
    --surface: #142845;
    --border: rgba(176, 193, 212, 0.20);
    --teal: #2dd4bf;
    --text: #f1f5f9;
    --text-strong: #ffffff;
    --text-muted: #cbd5e1;
    --on-teal: #0a1628;
    --gradient-end: #38bdf8;
  }

  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -20%; left: -10%;
    width: 60%; height: 60%;
    background: radial-gradient(circle, rgba(45, 212, 191, 0.10) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%; right: -10%;
    width: 60%; height: 60%;
    background: radial-gradient(circle, rgba(56, 189, 248, 0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .grid-lines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
    background-image:
      linear-gradient(var(--teal) 1px, transparent 1px),
      linear-gradient(90deg, var(--teal) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    position: relative;
    z-index: 1;
  }

  .nav-logo {
    position: fixed;
    top: 24px; left: 32px;
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text-strong);
    text-decoration: none;
    letter-spacing: -0.02em;
  }
  .nav-logo span { color: var(--teal); }

  .error-code {
    font-family: 'Fraunces', serif;
    font-size: clamp(100px, 20vw, 180px);
    font-weight: 600;
    line-height: 1;
    background: linear-gradient(135deg, var(--teal) 0%, var(--gradient-end) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.04em;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 40px rgba(45, 212, 191, 0.3));
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 56px;
    max-width: 520px;
    width: 100%;
    margin-top: -16px;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(24px, 4vw, 32px);
    font-weight: 600;
    color: var(--text-strong);
    line-height: 1.2;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }

  p {
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1.65;
    margin-bottom: 32px;
  }

  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--teal);
    color: var(--on-teal);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 24px;
    border-radius: 12px;
    text-decoration: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }

  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    text-decoration: none;
    transition: border-color 0.2s ease, color 0.2s ease;
  }
  .btn-ghost:hover { border-color: var(--teal); color: var(--teal); }

  .icon {
    font-size: 48px;
    margin-bottom: 24px;
    display: block;
  }

  .lock-animation {
    animation: shake 4s ease-in-out infinite;
  }

  @keyframes shake {
    0%, 85%, 100% { transform: translateX(0) rotate(0deg); }
    88% { transform: translateX(-4px) rotate(-3deg); }
    91% { transform: translateX(4px) rotate(3deg); }
    94% { transform: translateX(-3px) rotate(-2deg); }
    97% { transform: translateX(3px) rotate(2deg); }
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(45, 212, 191, 0.08);
    border: 1px solid rgba(45, 212, 191, 0.20);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--teal);
    margin-bottom: 28px;
  }

  @media (max-width: 480px) {
    .card { padding: 36px 28px; }
    .actions { flex-direction: column; }
    .btn-primary, .btn-ghost { justify-content: center; }
  }
</style>
</head>
<body>

<div class="grid-lines" aria-hidden="true"></div>

<a href="/" class="nav-logo">b<span>.</span> welch</a>

<div class="page">
  <div class="error-code" aria-hidden="true">403</div>
  <div class="card">
    <span class="icon lock-animation" aria-hidden="true">🔒</span>
    <p class="eyebrow">Access denied</p>
    <h1>This one's behind a velvet rope.</h1>
    <div class="badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Password required
    </div>
    <p>This page is password protected. If you have access, head back and enter your credentials. If you think you're seeing this by mistake, reach out.</p>
    <div class="actions">
      <a href="/" class="btn-primary">← Back to portfolio</a>
      <a href="mailto:blrwelch@gmail.com" class="btn-ghost">Request access</a>
    </div>
  </div>
</div>

</body>
</html>
